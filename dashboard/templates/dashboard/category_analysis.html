{% load category_extras %}

<h1>{{ category }} analysis</h1>

<h2>Liked Posts contributing to this</h2>

{% for post in liked_posts %}
    <div>
        <img src="{{ post.post_image.url }}" width="120">
        <p>{{ post.post_caption }}</p>
    </div>
{% endfor %}

<h2>Disliked Posts contributing to this</h2>

{% for post in disliked_posts %}
    <div>
        <img src="{{ post.post_image.url }}" width="120">
        <p>{{ post.post_caption }}</p>
    </div>
{% endfor %}
