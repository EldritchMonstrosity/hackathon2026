<a href="{% url 'dashboard:dashboard' %}">Back to Dashboard</a>

{% for post in posts %}
    <div>
        <a href="{% url 'dashboard:post_individual' post.id %}">
            <img src="{{ post.post_image.url }}" width="200">
            <p>{{ post.post_caption }}</p>
        </a>
    </div>
{% endfor %}
